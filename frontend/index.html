<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon"
    href="https://res.cloudinary.com/dizkxmaoh/image/upload/logo_favicon_uezwjw.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stocka - Professional Business Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #09111E;
    }

    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #09111E;
      z-index: 9999;
      transition: opacity 1s cubic-bezier(0.7, 0, 0.3, 1), visibility 1s;
      font-family: 'Urbanist', sans-serif;
    }

    #initial-loader.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    /* Minimalist Pulse Loader */
    .loader-ring {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-outer {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }

    .ring-active {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .ring-dot {
      width: 12px;
      height: 12px;
      background: #ffffff;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(0.8);
        opacity: 0.5;
      }

      50% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    .loader-info {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .loader-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .loader-subtitle {
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .progress-bar-container {
      width: 160px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background: #ffffff;
      transition: width 0.3s ease;
    }
  </style>
</head>

<body>
  <div id="initial-loader">
    <div class="loader-content">
      <div class="loader-ring">
        <div class="ring-outer"></div>
        <div class="ring-active"></div>
        <div class="ring-dot"></div>
      </div>
      <div class="loader-info">
        <h1 class="loader-title">Stocka</h1>
        <p class="loader-subtitle" id="loader-status">Initializing secure modules...</p>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="loader-progress"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Loader State Management
    const progressFill = document.getElementById('loader-progress');
    const statusText = document.getElementById('loader-status');
    const statuses = [
      'Synchronizing business data...',
      'Verifying security protocols...',
      'Optimizing dashboard assets...',
      'Finalizing secure environment...'
    ];

    let currentPercent = 0;

    const interval = setInterval(() => {
      if (currentPercent < 90) {
        currentPercent += Math.random() * 8;
        if (currentPercent > 90) currentPercent = 90;
        updateUI(currentPercent);
      }
    }, 300);

    function updateUI(percent) {
      if (progressFill) progressFill.style.width = percent + '%';
      const statusIndex = Math.floor((percent / 100) * statuses.length);
      if (statusText && statuses[statusIndex]) {
        statusText.textContent = statuses[statusIndex];
      }
    }

    window.finishLoader = () => {
      clearInterval(interval);
      updateUI(100);
      if (statusText) statusText.textContent = 'System ready';
      setTimeout(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(() => loader.remove(), 1000);
        }
      }, 300);
    };

    // Auto-fallback
    setTimeout(() => {
      if (currentPercent < 100) window.finishLoader();
    }, 4000);
  </script>
</body>

</html>
